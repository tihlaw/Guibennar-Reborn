 guib_gcvariance_some:0 "ON"
 guib_gcvariance_none:0 "OFF"
 guib_gc_variance_button_tooltip:0 "With §YVariance OFF§!, AI countries that already have a good chance to consolidate their surroundings will be more likely to get chosen as §YGreat Conquerors§!.\n\nWith §YVariance ON§! smaller countries will also become elligible to become §YGreat Conquerors§! to allow for more diversity in your games, at the cost of potentialy having less successful §YGreat Conquerors§!."
 
