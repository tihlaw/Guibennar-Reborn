 guib_gcmode_none:0 "Normal mode"
 guib_gc_mode_button_tooltip:0 "The §YGreat Conquerors§! setting grant bonuses to dynamically chosen AI countries to help them consolidate their surroundings, to provide more challenging opponents for the middle and late game.\n--------------\n§YNormal Mode:§! Conquerors are disabled and the game will play the same as vanilla\n§YGreat Conquerors:§! A few randomly selected AI countries will occasionally see their ruler get the Great Conqueror modifier, giving them bonuses to conquest and make the AI more aggressive.\n§YMythical Conquerors:§! Mythical Conquerors are a more extreme version of Great Conquerors. Chose this mode if you really enjoy being challenged"
 
 guib_gc_variance_title:0 "[Root.GetGCModeColor]Target Variance§!"
